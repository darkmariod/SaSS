# Nginx Configuration for Barber Booking App
# Serves Laravel via PHP-FPM

server {
    # Listen on port 80 (HTTP)
    listen 80;
    server_name _;

    # Laravel root directory
    root /var/www/public;
    index index.php;

    # ──────────────────────────────────────────
    # Static Assets (CSS, JS, Images, Fonts)
    # Long cache with Cache-Control headers
    # ──────────────────────────────────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        # Cache static assets for 1 year
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;

        # Try to serve the file directly
        try_files $uri =404;
    }

    # ──────────────────────────────────────────
    # Laravel Pretty URLs (Front Controller)
    # All non-file requests go through index.php
    # ──────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ──────────────────────────────────────────
    # PHP-FPM Handler
    # Proxies PHP requests to PHP-FPM
    # ──────────────────────────────────────────
    location ~ \.php$ {
        # Pass request to PHP-FPM
        fastcgi_pass php-fpm:9000;
        fastcgi_index index.php;

        # Set SCRIPT_FILENAME for PHP-FPM
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;

        # Include standard FastCGI parameters
        include fastcgi_params;

        # Additional PHP-FPM optimizations
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        # Increase timeout for slow PHP operations
        fastcgi_read_timeout 300;
    }

    # ──────────────────────────────────────────
    # Security: Deny access to sensitive files
    # ──────────────────────────────────────────
    location ~ /\.(env|git|svn) {
        deny all;
    }

    location ~ /(composer\.json|composer\.lock|package\.json|package-lock\.json|yarn\.lock) {
        deny all;
    }

    # ──────────────────────────────────────────
    # Health Check Endpoint (optional)
    # ──────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
